# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
#
# Membrane-embedded build of HIV-1 gp41 MPER-TM trimer (6e8w)
#
# The asymmetric viral bilayer is built with the grid packer (bilayer.packer:
# grid): two symmetric calibration patches (one per leaflet composition) are
# relaxed to measure each leaflet's preferred area-per-lipid, then the membrane
# is gridded directly at stress-free per-leaflet counts and sized to the protein
# footprint -- no packmol required. The differential-stress diagnostic then
# reports the residual per-leaflet surface tensions of the assembled membrane.
#
# NOTE: This example uses NAMD's on-the-fly pressureProfile calculation in the
# differential-stress diagnostic, the post-equilibration NPAT stage, and the
# packaged production run. CUDA-enabled (GPU) NAMD does not support
# pressureProfile, so this example must be run with a CPU NAMD build. Remove the
# `pressureProfile*` keys (and diagnose_differential_stress) to use a GPU build.
#
title: HIV-1 gp41 MPER-TM trimer 6e8w embedded in model viral bilayer (grid packer)
tasks:
  - fetch:
      sourceID: 6e8w
  - psfgen:
      source:
        model: 15 # last frame
  - md:
      cpu-override: True
      ensemble: minimize
  - make_membrane_system:
      diagnose_differential_stress:
        enabled: true
        nsteps: 50000
        slabs: 40
        freq: 500
      bilayer:
        packer: grid
        SAPL: 60.0
        salt_con: 0.154
        half_mid_zgap: 0.0
        cation: POT
        anion: CLA
        composition:
          lower_leaflet:
            - name: POPE
              frac: 0.09
            - name: SOPS
              frac: 0.18
            - name: SOPE
              frac: 0.30
            - name: CHL1
              frac: 0.43
          upper_leaflet:
            - name: PSM
              frac: 0.36
            - name: POPC
              frac: 0.17
            - name: CHL1
              frac: 0.47
        seed: 270272
        relaxation_protocols:
          # asymmetric grid: the patch protocol relaxes the two symmetric calibration
          # patches (one per leaflet composition), the quilt protocol relaxes the gridded
          # membrane. Long NPT/NPAT stages are auto-split into restarts so the condensing
          # cell never outgrows NAMD's startup patch grid.
          patch:
            - md:
                ensemble: minimize
                nsteps: 1000
            - md:
                ensemble: NVT
                nsteps: 1000
                temperature: 310
            - md:
                ensemble: NPT
                nsteps: 1000
                temperature: 410
                pressure: 10.0
            - md:
                ensemble: NPT
                nsteps: 2000
                temperature: 410
                pressure: 10.0
            - md:
                ensemble: NPT
                nsteps: 4000
                temperature: 360
                pressure: 10.0
            - md:
                ensemble: NPT
                nsteps: 8000
                temperature: 310
                pressure: 10.0
            - md:
                ensemble: NPT
                nsteps: 16000
                temperature: 310
                pressure: 4.0
            - md:
                ensemble: NPAT
                nsteps: 16000  # this is probably too short!
                temperature: 310
                pressure: 1.0
          quilt:
            - md:
                ensemble: minimize
            - md:
                ensemble: NVT
                nsteps: 1000
                temperature: 310
                pressure: 1.0
            - md:
                ensemble: NPT
                nsteps: 2000
                temperature: 310
                pressure: 1.0
            - md:
                ensemble: NPT
                nsteps: 4000
                temperature: 310
                pressure: 1.0
            - md:
                ensemble: NPAT
                nsteps: 8000
                temperature: 310
                pressure: 1.0
      embed:
        xydist: 20
        zdist: 10
        z_head_group: "protein and resid 667"
        z_tail_group: "protein and resid 710"
        z_ref_group: 
          text: "protein and resid 696"
          z_value: 0.0
  - md:
      ensemble: minimize
      minimize: 1000
      constraints:
        k: 10
        atoms: protein and name CA
  - ring_check:  # there are sterols!
  - validate:
      tests:
        - residue_test:
            name: test of protein presence
            selection: protein
            measure: residue_count
            relation: '>='
            value: 1
  - md:
      ensemble: NVT
      nsteps: 1000
      constraints:
        k: 10
        atoms: protein and name CA
  - md:
      ensemble: NVT
      nsteps: 6400
      temperature: 310
      constraints:
        k: 1
        atoms: protein and name CA
  - md:
      ensemble: NPT
      nsteps: 1000
      temperature: 360
  - md:
      ensemble: NPT
      nsteps: 2000
      temperature: 310
  - md:
      ensemble: NPT
      nsteps: 4000
      temperature: 310
  - md:
      ensemble: NPT
      nsteps: 8000
      temperature: 310
  - md:
      ensemble: NPT
      nsteps: 16000
      temperature: 310
  - md:
      ensemble: NPT
      nsteps: 32000
      temperature: 310
  - md:
      ensemble: NPAT
      nsteps: 51200  # this is way too short!!
      temperature: 310
      other_parameters:
        pressureProfile: on
        pressureProfileFreq: 100
        pressureProfileSlabs: 20
  - mdplot:
      timeseries:
        - [cpu_time, wall_time]
        - density
        - [a_x, b_y, c_z]
      profiles:
        - pressure
      basename: bilayer
  - terminate:
      basename: my_6e8w
      artifacts: artifacts
      package:
        basename: prod_6e8w
        namd:
          ensemble: NPAT
          firsttimestep: 0
          dcdfreq: 10000
          xstfreq: 10000
          outputenergies: 1000
          nsteps: 10000000
          other_parameters:
            pressureProfile: on
            pressureProfileFreq: 10000
            pressureProfileSlabs: 20
