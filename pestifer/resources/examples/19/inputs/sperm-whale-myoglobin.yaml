# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
#
# High-Resolution Crystal Structures of Distal Histidine Mutants of Sperm Whale Myoglobin
#
# This file was generated using the command ` pestifer new-system --id 1mob --build-type full`
# and subsequently edited.
#
# Notes:
#   - A self-terminating density_equilibrate task settles the box density
#   - A production tarball is generated: my_1mob.tgz

title: Sperm whale myoglobin
tasks:
  - fetch:
      sourceID: 1mob
  - psfgen:
  - validate:
      tests:
        - residue_test:
            name: HEME residue present
            selection: resname HEME
            measure: residue_count
            value: 1
  - md:
      ensemble: minimize
  - solvate:
      salt_con: 0.15
  - md:
      ensemble: minimize
  - md:
      ensemble: NVT
  # Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
  # stability-bounded short restarts and stops when the box density has converged.
  # Writes its own convergence report + density-vs-time plot.
  - density_equilibrate:
  - terminate:
      basename: my_1mob
      package:
        basename: my_1mob
        namd:
          ensemble: NPT