# Author: Cameron F. Abrams, <cfa22@drexel.edu>
title: Asymmetric GroEL/GroES Chaperonin Complex
tasks:
- fetch:
    sourceID: 1aon
- psfgen:
    source:
      biological_assembly: 1
- validate:
    tests:
    - residue_test:
        name: ADPs are present
        selection: resname ADP
        measure: residue_count
        value: 7
- md:
    ensemble: minimize
- solvate:
    salt_con: 0.15
- md:
    ensemble: minimize
- md:
    ensemble: NVT
# Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
# stability-bounded short restarts and stops when the box density has converged.
# Writes its own convergence report + density-vs-time plot.
- density_equilibrate:
- terminate:
    basename: my_1aon
    package:
      basename: my_1aon
      namd:
        ensemble: NPT