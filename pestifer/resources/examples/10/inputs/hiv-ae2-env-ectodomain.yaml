# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
# 
# Simple build of solvated HIV-1 Env trimer 8fae
#
# Notes:
#   - Missing protein is built-in
#   - Drug molecule (resname 83G) is included (previously parameterized using cgenff)
#   - mmCIF input file requires careful attention to chainIDs and
#     residue numbers
#   - A self-terminating density_equilibrate task settles the box density
#   - A production tarball is generated: prod_8fae.tgz
#
title: HIV-1 Env Trimer 8fae
tasks:
  - fetch:
      sourceID: 8fae
      source_format: cif
  - psfgen:
      source:
        biological_assembly: 1
        remap_chainIDs:
          B: G
          D: H
          E: I
          A: B
          F: D
        sequence:
          glycans:
            declash:
              maxcycles: 500
  - validate:
      tests:
        - residue_test:
            name: 83G ligands are present
            selection: resname 83G
            measure: residue_count
            value: 3
  - md:
      ensemble: minimize
  - ligate:
      steer:
        nsteps: 4000
  - validate:
      tests:
        - connection_test:
            name: gp120 gap ligations
            selection: protein and chain G H I and resid 112 113
            connection_type: interresidue
            connection_count: 3
  - md:
      ensemble: minimize
  - md:
      cpu-override: True
      ensemble: NVT
  - solvate:
  - md:
      ensemble: minimize
  - md:
      ensemble: NVT
  # Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
  # stability-bounded short restarts and stops when the box density has converged.
  # Writes its own convergence report + density-vs-time plot.
  - density_equilibrate:
  - terminate:
      basename: my_8fae
      package:
        basename: prod_8fae
        namd:
          ensemble: NPT