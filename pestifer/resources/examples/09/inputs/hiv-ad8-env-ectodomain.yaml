# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
# 
# Simple build of solvated HIV-1 Env trimer 8fad
#
# Notes:
#   - Missing protein is built-in
#   - Drug molecules (resname 83G) is included (previously parameterized using cgenff)
#   - mmCIF input file requires careful attention to chainIDs and
#     residue numbers
#   - Fine-tuning ramachandran rotations performed to avoid steric
#     clashes when building in missing residues
#   - A self-terminating density_equilibrate task settles the box density
#   - A production tarball is generated: prod_8fad.tgz
#
title: HIV-1 Env Trimer 8fad
tasks:
  - fetch:
      sourceID: 8fad
      source_format: cif
  - psfgen:
  - validate:
      tests:
        - residue_test:
            name: 83G ligands are present
            selection: resname 83G
            measure: residue_count
            value: 3
  - md:
      ensemble: minimize
  - ligate:
      method: ccd
      ccd:
        refine: 500
        ensemble: 4
  - validate:
      tests:
        - connection_test:
            name: chain F gap ligation
            selection: protein and chain F and resid 43 44
            connection_type: interresidue
            connection_count: 1
  - md:
      ensemble: minimize
  - md:
      cpu-override: True
      ensemble: NVT
  - solvate:
  - md:
      ensemble: minimize
  - md:
      ensemble: NVT
  # Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
  # stability-bounded short restarts and stops when the box density has converged.
  # Writes its own convergence report + density-vs-time plot.
  - density_equilibrate:
  - terminate:
      basename: my_8fad
      package:
        basename: prod_8fad
        namd:
          ensemble: NPT