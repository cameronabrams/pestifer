# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
# 
# Simple build of solvated hexameric insulin 2ins
#
# Notes:
#   - All waters are removed from the input PDB file
#   - A self-terminating density_equilibrate task settles the box density
#   - A production tarball is generated: prod_2ins.tgz
#
title: hexameric insulin
tasks:
  - fetch:
      sourceID: 2ins
      source_format: pdb
  - psfgen:
      source:
        biological_assembly: 1
        exclude:
          - resname == 'HOH'
  - md:
      cpu-override: True
      ensemble: minimize
  - validate:
      tests:
        - residue_test:
            name: no waters
            selection: resname HOH
            measure: residue_count
            value: 0
        - connection_test:
            name: check his-zinc ligation
            selection: (protein and chain B D H P N J and resid 10) or (chain E F K L Q R and resid 1 31)
            connection_type: interresidue
            connection_count: 6
  - solvate:
  - md:
      ensemble: minimize
  - md:
      ensemble: NVT
  # Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
  # stability-bounded short restarts and stops when the box density has converged.
  # Writes its own convergence report + density-vs-time plot.
  - density_equilibrate:
  - terminate:
      basename: my_2ins
      package:
        basename: prod_2ins
        namd:
          ensemble: NPT