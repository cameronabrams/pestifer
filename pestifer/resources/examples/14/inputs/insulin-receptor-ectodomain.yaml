# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
# 
# Simple build of solvated dimeric insulin receptor ectodomain
#
# Notes:
#   - Missing protein is built-in
#   - Fab chains are excluded
#   - Declashing is turned off
#   - A self-terminating density_equilibrate task settles the box density
#   - A production tarball is generated: prod_4zxb.tgz
#
title: insulin receptor ectodomain, Fabs removed
tasks:
  - fetch:
      sourceID: 4zxb
  - psfgen:
      source:
        biological_assembly: 1
        exclude:
          - chainID in ['A', 'B', 'C', 'D']
  - md:
      cpu-override: True
      ensemble: minimize
  - ligate:
      method: ccd
      ccd:
        refine: 500
        ensemble: 4
  - validate:
      tests:
        - connection_test:
            name: check ligation
            selection: chain A E and resid 693 694
            connection_type: interresidue
            connection_count: 2 
  - md:
      cpu-override: True
      ensemble: minimize
  - md:
      cpu-override: True
      ensemble: NVT
      nsteps: 24000
  - solvate:
  - md:
      ensemble: minimize
  - md:
      ensemble: NVT
  # Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
  # stability-bounded short restarts and stops when the box density has converged.
  # Writes its own convergence report + density-vs-time plot.
  - density_equilibrate:
  - terminate:
      basename: my_4zxb
      package:
        basename: prod_4zxb
        namd:
          ensemble: NPT