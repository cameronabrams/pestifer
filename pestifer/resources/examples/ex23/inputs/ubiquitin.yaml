# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
#
# Human ubiquitin (1ubq) with post-minimization crystal-frame alignment
#
# Notes:
#   - After vacuum minimization, the manipulate/align task rigidly
#     superimposes the pipeline system back onto the fetched crystal PDB
#     (1ubq.pdb), restoring the experimental coordinate frame before solvation.
#   - The 1ubq.pdb file is created by the fetch task and persists in the
#     working directory throughout the build.
#   - A production tarball is generated: prod_1ubq.tgz
#
title: Human ubiquitin (1ubq) with post-minimization crystal-frame alignment
tasks:
  - fetch:
      sourceID: 1ubq
  - psfgen:
  - md:
      ensemble: minimize
  - manipulate:
      mods:
        align:
          - ref_pdb: 1ubq.pdb
            mobile_sel: backbone
            ref_sel: backbone
  - solvate:
  - md:
      ensemble: minimize
  - md:
      ensemble: NVT
      nsteps: 400
  - md:
      ensemble: NPT
      nsteps: 200
  - md:
      ensemble: NPT
      nsteps: 400
  - md:
      ensemble: NPT
      nsteps: 800
  - md:
      ensemble: NPT
      nsteps: 1600
  - md:
      ensemble: NPT
      nsteps: 13200
  - mdplot:
      timeseries:
        - density
        - - cpu_time
          - wall_time
      units:
        cpu_time: s
        wall_time: s
      basename: solvated
      grid: True
  - terminate:
      basename: aligned_1ubq
      artifacts: artifacts
      package:
        basename: prod_1ubq
        namd:
          ensemble: NPT
