# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
#
# Human ubiquitin (1ubq) aligned to the GGA3-GAT binding pose (1yd8)
#
# Notes:
#   - 1yd8 is a crystal structure of ubiquitin (chain A) bound to the
#     GGA3 GAT domain (chain B); the complex represents ubiquitin
#     in its cargo-recognition binding pose at the trans-Golgi network.
#   - After vacuum minimization, the manipulate/align task rigidly
#     superimposes the built ubiquitin onto chain A of 1yd8, placing it
#     in the same orientation it adopts when engaging the GAT domain.
#   - A production tarball is generated: prod_1ubq.tgz
#
title: Human ubiquitin (1ubq) aligned to the GGA3-GAT binding pose (1yd8)
tasks:
  - fetch:
      sourceID: 1ubq
  - fetch:
      sourceID: 1yd8
  - psfgen:
  - md:
      ensemble: minimize
  - manipulate:
      mods:
        align:
          - ref_pdb: 1yd8.pdb
            mobile_sel: backbone
            ref_sel: "chain A and backbone"
  - solvate:
  - md:
      ensemble: minimize
  - md:
      ensemble: NVT
      nsteps: 400
  - md:
      ensemble: NPT
      nsteps: 200
  - md:
      ensemble: NPT
      nsteps: 400
  - md:
      ensemble: NPT
      nsteps: 800
  - md:
      ensemble: NPT
      nsteps: 1600
  - md:
      ensemble: NPT
      nsteps: 13200
  - mdplot:
      timeseries:
        - density
        - - cpu_time
          - wall_time
      units:
        cpu_time: s
        wall_time: s
      basename: solvated
      grid: True
  - terminate:
      basename: aligned_1ubq
      artifacts: artifacts
      package:
        basename: prod_1ubq
        namd:
          ensemble: NPT
