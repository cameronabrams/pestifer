title: Subtilisin Carlsberg in DMSO
psfgen:
  aliases:
    residue: ["CA CAL"]
    atom: ["CAL CA CAL"]
tasks:
- fetch:
    sourceID: 1scd
    source_format: pdb
- psfgen:
    source:
      biological_assembly: 1
- md:
    ensemble: minimize
- solvate:
    solvent: DMSO
- md:
    ensemble: minimize
- md:
    ensemble: nvt
# Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
# stability-bounded short restarts and stops when the box density has converged.
# Writes its own convergence report + density-vs-time plot.
- density_equilibrate:
- terminate:
    cleanup: true
