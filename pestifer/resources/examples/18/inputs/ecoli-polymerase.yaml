# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
#
# E. Coli replicative DNA polymerase complex 
# bound to a primer-template DNA
#
# Demonstration of nucleic acid building
# Three unresolved nucleic acid at 5' end of chain T are modeled in
#
title: E. Coli replicative DNA polymerase complex bound to a primer-template DNA
tasks:
  - fetch:
      sourceID: 5fkw
  - psfgen:
      source:
        sequence:
          terminal_tails:
            n: [T]
          loops:
            min_loop_length: 2
            declash:
              maxcycles: 40
  - md:
      ensemble: minimize
  - ligate:
      method: ccd
      ccd:
        refine: 500
        ensemble: 4
  - md:
      ensemble: minimize
  - validate:
      tests:
        - residue_test:
            name: resids 9, 10, and 11 of chain T present
            selection: chain T and resid 9 10 11
            measure: residue_count
            value: 3
  - md:
      cpu-override: True
      ensemble: NVT
      nsteps: 2400
  - solvate:
        salt_con: 0.15
        cation: SOD
        anion: CLA
  - md:
      ensemble: minimize
  - md:
      ensemble: NVT
  # Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
  # stability-bounded short restarts and stops when the box density has converged.
  # Writes its own convergence report + density-vs-time plot.
  - density_equilibrate:
  - terminate:
      basename: my_5fkw
      package:
        basename: prod_5fkw
        namd:
          ensemble: NPT