# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
# 
# Fasciculin 1, demonstration of pdb2pqr usage
#
title: Fasciculin 1, an Anti-Acetylcholinesterase Toxin from Green Mamba Snake Venom
tasks:
- fetch:
    sourceID: 1fas
- psfgen:
- md:
    ensemble: minimize
- pdb2pqr:
    pH: 7.0
- validate:
    tests:
      - residue_test:
          name: no altloc B atoms present
          selection: altloc B
          measure: atom_count
          value: 0
- solvate:
    anion: CLA
    cation: SOD
    salt_con: 0.154
- md:
    ensemble: minimize
- md:
    ensemble: NVT
# Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
# stability-bounded short restarts and stops when the box density has converged.
# Writes its own convergence report + density-vs-time plot.
- density_equilibrate:
- terminate:
    basename: my_1fas
    package:
      basename: prod_1fas
      namd:
        ensemble: NPT
