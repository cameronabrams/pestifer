# Author: Cameron F. Abrams, <cfa22@drexel.edu>
title: Ferredoxin-NADP(H) Reductase from Rhodobacter capsulatus
tasks:
- fetch:
    sourceID: 2bgj
- psfgen:
    source:
      exclude:
        - chainID in ['B', 'C', 'D']  # remove other protein chains
- validate:
    tests:
    - residue_test:
        name: no chains B, C, or D
        selection: protein and chain B C D
        measure: atom_count
        value: 0
    - residue_test:
        name: has FAD
        selection: resname FAD
        measure: residue_count
        value: 1
- md:
    ensemble: minimize
- solvate:
- md:
    ensemble: minimize
- md:
    ensemble: NVT
# Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
# stability-bounded short restarts and stops when the box density has converged.
# Writes its own convergence report + density-vs-time plot.
- density_equilibrate:
- terminate:
    basename: my_2bgj
    package:
      basename: my_2bgj
      namd:
        ensemble: NPT