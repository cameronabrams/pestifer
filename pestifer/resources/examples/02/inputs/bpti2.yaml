# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
# 
# Simple build of solvated BPTI (mimics psfgen user manual)
#
# Notes:
#   - The phospate ion is excluded, but all crystal waters are retained
#   - Solution has 0.154 M NaCl
#   - A self-terminating density_equilibrate task settles the box density
#   - A production tarball is generated: prod_6pti.tgz rooted in directory ready-to-run
#
title: BPTI with phosphate ion excluded in salty solution
tasks:
  - fetch:
      sourceID: 6pti
  - psfgen:
      source:
        exclude:
          - resname == 'PO4'
  - validate:
      tests:
        - residue_test:
            name: phosphate ion excluded
            selection: resname PO4
            measure: residue_count
            value: 0
  - md:
      ensemble: minimize
  - solvate:
      salt_con: 0.154
      cation: SOD
      anion: CLA
  - md:
      ensemble: minimize
  - md:
      ensemble: NVT
  # Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
  # stability-bounded short restarts and stops when the box density has converged.
  # Writes its own convergence report + density-vs-time plot.
  - density_equilibrate:
  - terminate:
      basename: my_6pti
      package:
        basename: prod_6pti
        namd:
          ensemble: NPT