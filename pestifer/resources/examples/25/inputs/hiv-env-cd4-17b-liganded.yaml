# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# Open, sCD4/17b-liganded HIV-1 B41 SOSIP Env ectodomain trimer (PDB 5vn3), built as the FULL
# complex: the Env trimer, three soluble CD4 (sCD4), and three *completed* 17b Fabs.
#
# In 5vn3 each 17b Fab is only half-resolved -- just its two variable domains (the Fv), which
# form the CD4-induced epitope contact with gp120.  This build completes each Fab by grafting
# the missing constant domains from a fully-resolved 17b Fab (PDB 1gc1), while preserving the
# 5vn3 Env-Fab interface atom-for-atom.
#
# This is a multi-step build.  Run the four helper scripts first (see the tutorial), which
# produce base.psf/pdb (Env+sCD4) and fab_p1/p2/p3.psf/pdb (the three completed Fabs), then run
# this script to merge, solvate, and equilibrate.
title: Open HIV-1 B41 SOSIP Env trimer with sCD4 and completed 17b Fabs (5vn3)
tasks:
  - continuation:
      psf: base.psf
      pdb: base.pdb
  # segment names are auto-enumerated on collision (H, H0, H1 ...)
  - merge:
      systems:
        - psf: fab_p1.psf
          pdb: fab_p1.pdb
        - psf: fab_p2.psf
          pdb: fab_p2.pdb
        - psf: fab_p3.psf
          pdb: fab_p3.pdb
  # relax the Fv/constant-domain junctions and the tightly-packed completed-Fab N-termini
  - md:
      cpu-override: True
      ensemble: minimize
      minimize: 5000
  # solvate neutralizes the net charge with counter-ions
  - solvate:
  - md:
      ensemble: minimize
      minimize: 5000
  # Gentle staged warmup.  The completed 17b Fab N-termini pack tightly against neighboring
  # chains (a hard, interlocked contact minimization alone can't fully clear), so a full-
  # temperature NVT start RATTLE-fails on the first step.  Warm up cold and slow first: a
  # 50 K, 0.5 fs stage with rigidBonds off (no constraints to fail) lets the residual strain
  # dissipate, then ramp the temperature back up before the production NPT schedule.
  - md:
      ensemble: NVT
      temperature: 50
      nsteps: 2000
      other_parameters:
        timestep: 0.5
        rigidbonds: none   # must match the built-in key's spelling to override it (pestifer
                           # merges NAMD directives in a case-sensitive dict; a mismatched
                           # spelling emits a second line and NAMD rejects the duplicate)
  - md:
      ensemble: NVT
      temperature: 150
      nsteps: 2000
      other_parameters:
        timestep: 1.0
  - md:
      ensemble: NVT
      temperature: 300
  # Self-terminating NPT density equilibration (replaces the old NPT ladder): runs
  # stability-bounded short restarts and stops when the box density has converged.
  # Writes its own convergence report + density-vs-time plot.
  - density_equilibrate:
  - terminate:
      basename: my_5vn3_liganded
      package:
        basename: prod_5vn3_liganded
        namd:
          ensemble: NPT
