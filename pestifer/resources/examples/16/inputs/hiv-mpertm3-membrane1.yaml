# Author: Cameron F. Abrams, <cfa22@drexel.edu>
#
# pestifer input script
#
# Membrane-embedded build of HIV-1 gp41 MPER-TM trimer (6e8w)
#
# The DMPC bilayer is built with the grid packer, which places lipids on a
# lattice directly and sizes the membrane to the protein footprint.
#
# NOTE: This example uses NAMD's on-the-fly pressureProfile calculation in the
# post-equilibration NPgT stage and in the packaged production run. CUDA-enabled
# (GPU) NAMD does not support pressureProfile, so this example must be run with
# a CPU NAMD build. Remove the `pressureProfile*` keys from the relevant
# `other_parameters` blocks (or omit `--gpu`) to use a GPU build.
#
title: HIV-1 gp41 MPER-TM trimer 6e8w embedded in DMPC bilayer (grid packer)
tasks:
  - fetch:
      sourceID: 6e8w
  - psfgen:
      source:
        model: 15 # last frame
  - md:
      cpu-override: True
      ensemble: minimize
  - make_membrane_system:
      bilayer:
        packer: grid
        salt_con: 0.154
        cation: POT
        anion: CLA
        SAPL: 60.0
        composition:
          lower_leaflet:
            - name: DMPC
              frac: 1.00
          upper_leaflet:
            - name: DMPC
              frac: 1.00
        seed: 270272
        relaxation_protocols:
          # symmetric grid builds the membrane directly (no calibration patches), so only
          # the quilt protocol -- the relaxation of the gridded membrane -- is used. Long
          # NPT/NPgT stages are auto-split into restarts so the condensing cell never
          # outgrows NAMD's startup patch grid.
          quilt:
            - md:
                ensemble: minimize
            - md:
                ensemble: NVT
                nsteps: 1000
                temperature: 310
                pressure: 1.0
            - md:
                ensemble: NPT
                nsteps: 2000
                temperature: 310
                pressure: 1.0
            - md:
                ensemble: NPT
                nsteps: 4000
                temperature: 310
                pressure: 1.0
            - md:
                ensemble: NPT
                nsteps: 8000
                temperature: 310
                pressure: 1.0
            - md:
                ensemble: NPgT
                nsteps: 16000
                temperature: 310
                pressure: 1.0
      embed:
        xydist: 40
        zdist: 10
        z_head_group: "protein and resid 667"
        z_tail_group: "protein and resid 710"
        z_ref_group: 
          text: "protein and resid 696"
          z_value: 0.0
  - validate:
      tests:
        - residue_test:
            name: test of protein presence
            selection: protein
            measure: residue_count
            relation: '>='
            value: 1
  - md:
      ensemble: minimize
      minimize: 1000
      constraints:
        k: 10
        atoms: protein and name CA
  # --- post-embed equilibration ---
  # A brief warm pass fluidizes the lipids around the freshly-embedded protein;
  # staged isotropic NPT then condenses out the embedding voids (each stage is a
  # restart, so the shrinking cell never outgrows NAMD's startup patch grid); and
  # a long, restart-staged NPgT relaxes the lateral area at zero tension -- the
  # only ensemble that can, and the one that actually sets the equilibrium area.
  # Weak CA restraints hold the protein steady while the box relaxes and are
  # released only on the final stage, on which the pressure profile is computed.
  - md:
      ensemble: NVT
      nsteps: 1000
      temperature: 410
      constraints:
        k: 10
        atoms: protein and name CA
  - md:
      ensemble: NVT
      nsteps: 4000
      temperature: 310
      constraints:
        k: 1
        atoms: protein and name CA
  - md:
      ensemble: NPT
      nsteps: 2000
      temperature: 310
      constraints:
        k: 1
        atoms: protein and name CA
  - md:
      ensemble: NPT
      nsteps: 4000
      temperature: 310
      constraints:
        k: 1
        atoms: protein and name CA
  - md:
      ensemble: NPT
      nsteps: 8000
      temperature: 310
      constraints:
        k: 1
        atoms: protein and name CA
  - md:
      ensemble: NPT
      nsteps: 16000
      temperature: 310
      constraints:
        k: 1
        atoms: protein and name CA
  - md:
      ensemble: NPgT
      nsteps: 16000
      temperature: 310
      constraints:
        k: 1
        atoms: protein and name CA
  - md:
      ensemble: NPgT
      nsteps: 32000
      temperature: 310
      constraints:
        k: 1
        atoms: protein and name CA
  - md:
      ensemble: NPgT
      nsteps: 64000
      temperature: 310
      constraints:
        k: 1
        atoms: protein and name CA
  - md:
      # final, unrestrained NPgT stage -- ~256 ps to let the lateral area plateau;
      # the pressure profile is sampled only here, on the equilibrated cell
      ensemble: NPgT
      nsteps: 128000
      temperature: 310
      other_parameters:
        pressureProfile: on
        pressureProfileFreq: 100
        pressureProfileSlabs: 20
  - mdplot:
      timeseries:
        - - cpu_time
          - wall_time
        - density
        - - a_x
          - b_y
          - c_z
      profiles:
        - pressure
      basename: bilayer
      grid: True
      legend: True
  - terminate:
      basename: my_6e8w
      package:
        basename: prod_6e8w
        namd:
          ensemble: NPgT
          firsttimestep: 0
          dcdfreq: 10000
          xstfreq: 10000
          outputenergies: 1000
          nsteps: 10000000
          other_parameters:
            pressureProfile: on
            pressureProfileFreq: 10000 # must equal xstfreq!
            pressureProfileSlabs: 20
