title: HIV-1 Env Trimer 4zmj and alpha-helical extension to mper 685 and and gp120 to 511
tasks:
  - fetch:
      sourceID: 4zmj
  - psfgen:
      source:
        biological_assembly: 1
        sequence:
          build_zero_occupancy_C_termini: [B, G]
          build_zero_occupancy_N_termini: [G]
          fix_engineered_mutations: True   # undoes the SOSIP mutations
          loops:
            declash:
              maxcycles: 20
              include_C_termini: False
          glycans:
            numbering: wide
        transform_reserves:
          B: [C, D]
          G: [H, J]
      mods:
        mutations:
          - G:G507Q
          - G:R509E
          - G:R510K
        insertions:
          - B,664+,KWASLWNWFDITNWLWYIKIF
        crotations: # makes sure all alpha-9's are helical thru 685 mper
          - psi,G,494,511,5.0
          - psi,G,498,511,4.0
          - psi,G,500,511,-12.0
          - psi,G,502,511,12.0
          - phi,G,502,511,10.0
          - phi,G,500,511,-2.0
          - phi,G,501,511,-6.0
          - psi,G,503,511,-62.0
          - phi,G,503,511,22.0
          #- phi,G,501,511,-5.0
          - psi,G,504,511,-76.0
          - phi,G,504,511,26.0
          - psi,G,502,511,-14.0
          - phi,G,502,511,8.0
          - psi,G,501,511,-5.0
          - phi,G,500,511,-3.0
          - phi,G,502,511,-2.0
          - psi,G,505,511,-78.0
          - phi,G,505,511,13.0
          - psi,G,506,511,-48.0
          - phi,G,506,511,64.0
          - psi,G,507,511,-64.0
          - phi,G,507,511,94.0
          - psi,G,508,511,250.0
          - phi,G,508,511,-48.0
          - phi,G,509,511,90.0
          - psi,G,509,511,-90.0
          - psi,G,510,511,0.0
          #- phi,G,510,511,-6.0
          - psi,G,508,511,-13.0
          - phi,G,508,511,10.0
          - psi,G,507,511,-17.0
          - psi,G,509,511,-30.0
          - phi,G,509,511,-13.0
          - psi,G,510,511,186.0
          - phi,G,510,511,38.0
          #######################
          - psi,B,546,568,-180.0
          - phi,B,547,568,-60.0
          - alpha,B,640,685
          - psi,B,640,685,-14.0
          - phi,B,640,685,-2.0
          - psi,B,664,685,98.0
          - psi,B,665,685,-40.0
          - psi,B,660,685,19.0
          - psi,B,661,685,-17.0
          - psi,B,667,678,-20.0
          - phi,B,667,678,-14.0
          - psi,B,666,678,26.0
          - psi,B,673,678,-12.0
          - psi,B,671,678,12.0
          - psi,B,676,685,-10.0
          - psi,B,677,685,21.0
          - psi,B,678,679,-78.0
          - phi,B,678,679,90.0
            #- psi,B,679,780,60.0
          - psi,B,679,685,-77.0
          - psi,B,680,685,82.0
          - phi,B,680,685,-176.0
