title: Closed, PGT122/35O22-Liganded HIV-1 BG505 Env SOSIP.664 Trimer (pre-solvation vacuum build)
tasks:
  - fetch:
      sourceID: 4tvp
      source_format: cif
  - psfgen:
      source:
        biological_assembly: 1
        exclude:
          - chainID in ['C', 'D', 'E', 'F', 'KA', 'LA', 'OA', 'PA', 'QA', 'RA']
        transform_reserves:
          A: [C, E]
          B: [D, F]
      mods:
        mutations:
          - A:CYS,469,ALA
          - B:CYS,94,THR
          - B:PRO,48,ILE
        crotations:
          - psi,B,35,57,-180
          - phi,B,35,57,-60
          - phi,B,39,57,-30
  - md:
      ensemble: minimize
      nsteps: 3000
  - md:
      ensemble: NVT
      nsteps: 2000
  - ligate:
      steer:
        force_constant: 10
        nsteps: 6000
  - md:
      ensemble: minimize
      nsteps: 3000
  - md:
      cpu-override: True
      ensemble: NVT
      nsteps: 2000
  - terminate:
      basename: my_4tvp_vac
