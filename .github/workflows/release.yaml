name: Release & Upload to PyPI & Archive at Zenodo

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Hatch
        run: python -m pip install --upgrade pip hatch

      - name: Clean previous builds
        run: rm -rf dist/

      - name: Verify tag matches pyproject version and CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          echo "Tag version: $TAG"
          echo "Project version: $VER"
          test "$TAG" = "$VER" || { echo "ERROR: tag $TAG != pyproject version $VER"; exit 1; }
          grep -q "^## \[$VER\]" CHANGELOG.md || { echo "ERROR: no CHANGELOG entry for $VER"; exit 1; }

      - name: Build the package with Hatch
        run: hatch build -t sdist -t wheel

      - name: Verify dist contents
        run: ls -lh dist/

      - name: Extract most recent release notes from CHANGELOG.md
        id: changelog
        run: |
          echo 'RELEASE_BODY<<EOF' >> $GITHUB_ENV
          awk '
            BEGIN {found=0; capture=0}
            /^## \[UNRELEASED\]/ {next}
            /^## \[/ {
              if (found) exit;
              found = 1;
              capture = 1;
              next
            }
            /^## / {capture=0}
            capture {print}
          ' CHANGELOG.md >> $GITHUB_ENV
          echo 'EOF' >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: ${{ env.RELEASE_BODY }}
          files: |
            dist/*.tar.gz
            dist/*.whl

      - name: Publish to PyPI using Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Trigger ReadTheDocs build
        run: |
          curl -X POST \
            -H "Authorization: Token ${{ secrets.RTD_SECRET }}" \
            https://readthedocs.org/api/v3/projects/pestifer/versions/latest/builds/
          curl -X POST \
            -H "Authorization: Token ${{ secrets.RTD_SECRET }}" \
            https://readthedocs.org/api/v3/projects/pestifer/versions/${{ github.ref_name }}/builds/
