name: Release & Upload to PyPI & Archive at Zenodo

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    uses: cameronabrams/workflows/.github/workflows/python-release.yml@main
    with:
      rtd_slug: pestifer
      run_tests: false
    secrets: inherit

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
